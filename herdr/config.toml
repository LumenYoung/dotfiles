onboarding = false

[keys]
# Match the primary Zellij session prefix: Ctrl-o.
prefix = "ctrl+o"

# Match Zellij detach: Ctrl-o d.
detach = "prefix+d"

# Direct workspace navigation.
previous_workspace = "alt+b"
next_workspace = "alt+n"
new_workspace = "prefix+shift+n"

# Direct tab navigation inside the current workspace.
previous_tab = "alt+o"
next_tab = "alt+p"
# Terminals usually report Alt+Shift+n as Alt+N (uppercase char) rather than
# Alt+Shift+n, so bind the actual sequence Herdr receives.
new_tab = "alt+N"
rename_tab = "prefix+r"

# Direct pane split/focus shortcuts.
split_vertical = "alt+v"
split_horizontal = "alt+c"
focus_pane_left = "alt+h"
focus_pane_down = "alt+j"
focus_pane_up = "alt+k"
focus_pane_right = "alt+l"
close_pane = "alt+x"

# Move resize mode away from Ctrl-o r so rename_tab can use it.
resize_mode = "prefix+s"
settings = ""

# Match Vim/Zellij direction semantics for workspace navigation in Herdr's navigate mode.
navigate_workspace_down = "j"
navigate_workspace_up = "k"

# Avoid colliding with workspace j/k; keep vertical pane navigation on arrows.
navigate_pane_down = "down"
navigate_pane_up = "up"

[ui]
agent_panel_scope = "all"

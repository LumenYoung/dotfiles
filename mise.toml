[tools]
# CLI essentials — daily shell/navigation/search primitives
fd = "latest"
ripgrep = "latest"
fzf = "latest"
zoxide = "latest"
eza = "latest"
bat = "latest"
dust = "latest"
just = "latest"

# Terminal workspace / TUI utilities
zellij = "latest"
yazi = "latest"
btop = "latest"
lazygit = "latest"

# Editors and language runtimes
neovim = "latest"
node = "lts"
bun = "latest"
rust = "latest"
uv = "latest"

# Build toolchain
cmake = "latest"
ninja = "latest"
make = "latest"

# Agent-facing CLIs
codex = "latest"
opencode = "latest"
"npm:t3" = "latest"
"npm:@anthropic-ai/claude-code" = "latest"
"npm:@earendil-works/pi-coding-agent" = "latest"
"github:iwe-org/iwe" = { version = "latest", version_prefix = "iwe-v" }

# Agent support tools / integrations
"aqua:rtk-ai/rtk" = "latest"
"github:harehare/mq" = "latest"

# Agent support tools / integrations requiring custom mise metadata
[tools."github:ogulcancelik/herdr"]
version = "latest"

[tools."github:ogulcancelik/herdr".platforms]
linux-x64 = { asset_pattern = "herdr-linux-x86_64", bin = "herdr" }
linux-arm64 = { asset_pattern = "herdr-linux-aarch64", bin = "herdr" }
macos-x64 = { asset_pattern = "herdr-macos-x86_64", bin = "herdr" }
macos-arm64 = { asset_pattern = "herdr-macos-aarch64", bin = "herdr" }

[tasks.sync-global-mise-tools]
description = "Copy this repo's mise tool manifest to ~/.config/mise/config.toml"
run = '''
#!/usr/bin/env bash
set -euo pipefail

GLOBAL_MISE_CONFIG="$HOME/.config/mise/config.toml"
mkdir -p "$(dirname "$GLOBAL_MISE_CONFIG")"
awk '/^\[tasks\./ { exit } { print }' mise.toml > "$GLOBAL_MISE_CONFIG"
'''

[tasks.ensure-local-fish]
description = "Create per-machine local fish override file"
run = "touch ~/.local.fish"

[tasks.remove-obsolete-codex]
description = "Remove the obsolete npm Codex installation from the micromamba main environment"
run = '''
#!/usr/bin/env bash
set -euo pipefail

MAMBA_ROOT_PREFIX="${MAMBA_ROOT_PREFIX:-$HOME/.local/share/mamba}"
LEGACY_CODEX_ENV="${LEGACY_CODEX_ENV:-main}"
legacy_prefix="${MAMBA_ROOT_PREFIX}/envs/${LEGACY_CODEX_ENV}"
npm_bin="${legacy_prefix}/bin/npm"
codex_bin="${legacy_prefix}/bin/codex"

if [[ ! -x "$npm_bin" ]]; then
  echo "No npm executable found in micromamba environment '${LEGACY_CODEX_ENV}': $npm_bin"
  exit 0
fi

if ! "$npm_bin" list --global --depth=0 @openai/codex >/dev/null 2>&1; then
  echo "No obsolete @openai/codex installation found in: $legacy_prefix"
  exit 0
fi

echo "Removing obsolete @openai/codex from: $legacy_prefix"
"$npm_bin" uninstall --global @openai/codex

if [[ -e "$codex_bin" || -L "$codex_bin" ]]; then
  echo "ERROR: obsolete Codex binary still exists after npm uninstall: $codex_bin" >&2
  exit 1
fi

echo "Obsolete micromamba Codex installation removed."
if mise_codex="$(mise which codex 2>/dev/null)"; then
  echo "Mise-managed Codex: $mise_codex"
fi
'''

[tasks.repair-claude-code]
description = "Repair mise-installed Claude Code when npm postinstall did not place the native binary"
run = '''
#!/usr/bin/env bash
set -euo pipefail

tool="npm:@anthropic-ai/claude-code"

if ! install_dir="$(mise where "$tool" 2>/dev/null)"; then
  echo "WARN: Claude Code is not installed by mise; skipping repair." >&2
  exit 0
fi

pkg_dir="$install_dir/lib/node_modules/@anthropic-ai/claude-code"
postinstall="$pkg_dir/install.cjs"
claude_bin="$install_dir/bin/claude"

if [[ -x "$claude_bin" ]] && "$claude_bin" --version >/dev/null 2>&1; then
  echo "Claude Code native binary is healthy: $claude_bin"
  exit 0
fi

if [[ ! -f "$postinstall" ]]; then
  echo "ERROR: Claude Code postinstall script not found: $postinstall" >&2
  exit 1
fi

if ! command -v node >/dev/null 2>&1; then
  echo "ERROR: node is required to repair Claude Code postinstall state." >&2
  exit 1
fi

echo "Claude Code native binary is missing/unhealthy; running npm postinstall repair."
node "$postinstall"
mise reshim "$tool" >/dev/null 2>&1 || mise reshim >/dev/null 2>&1 || true

if [[ ! -x "$claude_bin" ]] || ! "$claude_bin" --version >/dev/null 2>&1; then
  echo "ERROR: Claude Code repair did not produce a working binary: $claude_bin" >&2
  exit 1
fi

echo "Claude Code repaired: $($claude_bin --version)"
'''

[tasks.propagate-core]
description = "Symlink core dotfiles only"
run = "uv run --with pyyaml python propogate_dotfiles.py --core"

[tasks.propagate-agents]
description = "Symlink Codex, OpenCode, T3 Code, and related user units"
run = "uv run --with pyyaml python propogate_dotfiles.py --agents"

[tasks.t3-code-restart]
description = "Resolve Lumeny env from current shell/fallback fish env, then restart T3 Code user service"
run = '''
#!/usr/bin/env bash
set -euo pipefail

find_fish() {
  if command -v fish >/dev/null 2>&1; then
    command -v fish
  elif [[ -x "$HOME/.local/bin/fish" ]]; then
    printf '%s\n' "$HOME/.local/bin/fish"
  fi
}

read_fish_env_var() {
  local name="$1"
  local fish_bin="${2:-}"
  if [[ -z "$fish_bin" || ! -f "$HOME/.local.fish" ]]; then
    return 0
  fi

  "$fish_bin" -c '
    source "$HOME/.local.fish"
    set -l name $argv[1]
    if set -q $name
      printf "%s" $$name
    end
  ' -- "$name" 2>/dev/null || true
}

fish_bin="$(find_fish || true)"
base_url="${LUMENY_OPENAI_BASE_URL:-}"
api_key="${LUMENY_OPENAI_API_KEY:-}"
base_url_source="current shell"
api_key_source="current shell"

if [[ -z "$base_url" ]]; then
  base_url="$(read_fish_env_var LUMENY_OPENAI_BASE_URL "$fish_bin")"
  base_url_source="~/.local.fish"
fi

if [[ -z "$api_key" ]]; then
  api_key="$(read_fish_env_var LUMENY_OPENAI_API_KEY "$fish_bin")"
  api_key_source="~/.local.fish"
fi

if [[ -z "$base_url" || -z "$api_key" ]]; then
  echo "LUMENY_OPENAI_BASE_URL or LUMENY_OPENAI_API_KEY is missing from both current shell and ~/.local.fish." >&2

  if [[ ! -t 0 ]]; then
    echo "Non-interactive shell: refusing to restart T3 Code without explicit confirmation." >&2
    exit 1
  fi

  read -r -p "Start T3 Code without Lumeny/OpenAI API environment? [y/N] " answer
  case "$answer" in
    y|Y|yes|YES)
      systemctl --user unset-environment \
        LUMENY_OPENAI_BASE_URL \
        LUMENY_OPENAI_API_KEY \
        OPENAI_API_KEY || true
      echo "Continuing without Lumeny/OpenAI API environment."
      ;;
    *)
      echo "Aborted."
      exit 1
      ;;
  esac
else
  export LUMENY_OPENAI_BASE_URL="$base_url"
  export LUMENY_OPENAI_API_KEY="$api_key"
  export OPENAI_API_KEY="$api_key"
  systemctl --user import-environment \
    LUMENY_OPENAI_BASE_URL \
    LUMENY_OPENAI_API_KEY \
    OPENAI_API_KEY
  echo "Imported LUMENY_OPENAI_BASE_URL from $base_url_source."
  echo "Imported LUMENY_OPENAI_API_KEY/OPENAI_API_KEY from $api_key_source."
fi

systemctl --user daemon-reload
systemctl --user restart t3-code.service
systemctl --user status t3-code.service --no-pager --lines=10
'''

[tasks.propagate]
description = "Symlink all dotfiles into configured destinations"
run = "uv run --with pyyaml python propogate_dotfiles.py"

[tasks.install-fish]
description = "Build and install fish shell into ~/.local with a mise-managed C++ compiler"
run = """
#!/usr/bin/env bash
set -euo pipefail

if command -v fish >/dev/null 2>&1; then
  echo "fish already available at $(command -v fish); skipping source build."
  fish --version || true
  exit 0
fi

if [[ -x "$HOME/.local/bin/fish" ]]; then
  echo "fish already installed at $HOME/.local/bin/fish; skipping source build."
  "$HOME/.local/bin/fish" --version || true
  exit 0
fi

mise install conda:gxx_linux-64

add_mise_tool_bin_to_path() {
  local tool="$1"
  local install_dir bin
  install_dir="$(mise where "$tool")"
  bin="$(find "$install_dir" -maxdepth 5 -type f -perm -u+x -name "$tool" | head -n 1)"
  if [[ -z "$bin" ]]; then
    echo "ERROR: unable to find executable for mise tool: $tool" >&2
    return 1
  fi
  export PATH="$(dirname "$bin"):$PATH"
}

add_mise_tool_bin_to_path cmake
add_mise_tool_bin_to_path make
export PATH="$(mise where rust):$PATH"

GXX_DIR="$(mise where conda:gxx_linux-64)"
COMPILER_SHIMS="$(mktemp -d)"
trap 'rm -rf "$COMPILER_SHIMS"' EXIT
ln -sf "$GXX_DIR/bin/x86_64-conda-linux-gnu-gcc" "$COMPILER_SHIMS/cc"
ln -sf "$GXX_DIR/bin/x86_64-conda-linux-gnu-gcc" "$COMPILER_SHIMS/gcc"
ln -sf "$GXX_DIR/bin/x86_64-conda-linux-gnu-g++" "$COMPILER_SHIMS/c++"
ln -sf "$GXX_DIR/bin/x86_64-conda-linux-gnu-g++" "$COMPILER_SHIMS/g++"
export PATH="$COMPILER_SHIMS:$GXX_DIR/bin:$PATH"
export CC=cc
export CXX=c++
export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=cc

bash install/cli/fish_install.bash
test -x "$HOME/.local/bin/fish"
"""

[tasks.nvim-source]
description = "Build Neovim from source into ~/.local"
run = "bash install/cli/nvim_install_from_source.bash"

[tasks.desktop]
description = "Install desktop extras: Nerd Font and kitty"

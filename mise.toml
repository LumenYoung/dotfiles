[tasks.setup]
description = "Bootstrap this machine from dotfiles"
run = """
#!/usr/bin/env bash
set -euo pipefail

mise run ensure-submodules
mise install

# `mise upgrade` already only installs newer tool versions, but guard it with a
# dry-run so rerunning setup can cheaply skip the upgrade phase when nothing is
# outdated. `--local` keeps this scoped to the repo-managed tools in mise.toml.
upgrade_plan="$(mktemp)"
trap 'rm -f "$upgrade_plan"' EXIT
set +e
mise upgrade --local --dry-run-code >"$upgrade_plan" 2>&1
upgrade_rc=$?
set -e
case "$upgrade_rc" in
  0)
    echo "Mise tools are already up to date; skipping upgrade."
    ;;
  1)
    cat "$upgrade_plan"
    mise upgrade --local --yes
    ;;
  *)
    cat "$upgrade_plan" >&2
    exit "$upgrade_rc"
    ;;
esac
rm -f "$upgrade_plan"
trap - EXIT

mise run repair-claude-code
if ! mise run clean-user-tools -- --interactive; then
  echo "WARN: legacy user-space tool cleanup skipped or unavailable; continuing setup." >&2
fi
mise run sync-global-mise-tools
mise run ensure-iwe-notes
mise run ensure-local-fish
mise run propagate-core
mise run propagate-agents
mise run install-rtk-integrations
mise run install-pi-packages
mise run install-claude-coms-net-bridge-deps
mise run install-herdr-agent-skill
mise run install-herdr-integrations

if ! mise run install-fish; then
  echo "WARN: fish install failed; continuing because C++ compiler may be missing on this host." >&2
fi
"""

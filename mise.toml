[tools]
# Core CLI tools formerly installed via eget
fd = "latest"
ripgrep = "latest"
lazygit = "latest"
zellij = "latest"
zoxide = "latest"
fzf = "latest"
just = "latest"
eza = "latest"
yazi = "latest"
btop = "latest"
bat = "latest"
dust = "latest"

# Editors, runtimes, and build helpers
neovim = "latest"
node = "lts"
rust = "latest"
uv = "latest"
cmake = "latest"
ninja = "latest"
make = "latest"

# Agent / AI CLI tools
codex = "latest"

[tools."github:ogulcancelik/herdr"]
version = "latest"

[tools."github:ogulcancelik/herdr".platforms]
linux-x64 = { asset_pattern = "herdr-linux-x86_64", bin = "herdr" }
linux-arm64 = { asset_pattern = "herdr-linux-aarch64", bin = "herdr" }
macos-x64 = { asset_pattern = "herdr-macos-x86_64", bin = "herdr" }
macos-arm64 = { asset_pattern = "herdr-macos-aarch64", bin = "herdr" }

[tasks.sync-global-mise-tools]
description = "Copy this repo's mise tool manifest to ~/.config/mise/config.toml"
run = '''
#!/usr/bin/env bash
set -euo pipefail

GLOBAL_MISE_CONFIG="$HOME/.config/mise/config.toml"
mkdir -p "$(dirname "$GLOBAL_MISE_CONFIG")"
awk '/^\[tasks\./ { exit } { print }' mise.toml > "$GLOBAL_MISE_CONFIG"
'''

[tasks.ensure-local-fish]
description = "Create per-machine local fish override file"
run = "touch ~/.local.fish"

[tasks.propagate-core]
description = "Symlink core dotfiles only"
run = "uv run --with pyyaml python propogate_dotfiles.py --core"

[tasks.propagate]
description = "Symlink all dotfiles into configured destinations"
run = "uv run --with pyyaml python propogate_dotfiles.py"

[tasks.install-fish]
description = "Build and install fish shell into ~/.local with a mise-managed C++ compiler"
run = """
#!/usr/bin/env bash
set -euo pipefail

mise install conda:gxx_linux-64
GXX_DIR="$(mise where conda:gxx_linux-64)"
COMPILER_SHIMS="$(mktemp -d)"
trap 'rm -rf "$COMPILER_SHIMS"' EXIT
ln -sf "$GXX_DIR/bin/x86_64-conda-linux-gnu-gcc" "$COMPILER_SHIMS/cc"
ln -sf "$GXX_DIR/bin/x86_64-conda-linux-gnu-gcc" "$COMPILER_SHIMS/gcc"
ln -sf "$GXX_DIR/bin/x86_64-conda-linux-gnu-g++" "$COMPILER_SHIMS/c++"
ln -sf "$GXX_DIR/bin/x86_64-conda-linux-gnu-g++" "$COMPILER_SHIMS/g++"
export PATH="$COMPILER_SHIMS:$GXX_DIR/bin:$PATH"
export CC=cc
export CXX=c++
export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=cc

bash install/cli/fish_install.bash
test -x "$HOME/.local/bin/fish"
"""

[tasks.nvim-source]
description = "Build Neovim from source into ~/.local"
run = "bash install/cli/nvim_install_from_source.bash"

[tasks.desktop]
description = "Install desktop extras: Nerd Font and kitty"
run = """
bash install/desktop/nerdfont_install.bash
bash install/desktop/kitty_install.bash
"""


[tasks.install-herdr-agent-skill]
description = "Install Herdr agent skill for Codex-compatible agents"
run = '''
#!/usr/bin/env bash
set -euo pipefail

SKILL_URL="https://raw.githubusercontent.com/ogulcancelik/herdr/master/SKILL.md"
AGENTS_SKILL_DIR="$HOME/.agents/skills/herdr"
CODEX_SKILL_DIR="${CODEX_HOME:-$HOME/.codex}/skills/herdr"

mkdir -p "$AGENTS_SKILL_DIR" "$CODEX_SKILL_DIR"
if command -v curl >/dev/null 2>&1; then
  curl -fsSL "$SKILL_URL" -o "$AGENTS_SKILL_DIR/SKILL.md"
elif command -v wget >/dev/null 2>&1; then
  wget -qO "$AGENTS_SKILL_DIR/SKILL.md" "$SKILL_URL"
else
  echo "ERROR: curl or wget is required to install the Herdr agent skill." >&2
  exit 1
fi
cp "$AGENTS_SKILL_DIR/SKILL.md" "$CODEX_SKILL_DIR/SKILL.md"

echo "Installed Herdr agent skill:"
echo "  $AGENTS_SKILL_DIR/SKILL.md"
echo "  $CODEX_SKILL_DIR/SKILL.md"
'''

[tasks.install-herdr-integrations]
description = "Install Herdr hooks/plugins for locally configured agents"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if ! command -v herdr >/dev/null 2>&1; then
  echo "WARN: herdr is not on PATH; skipping Herdr integrations." >&2
  exit 0
fi

installed_any=false
if [[ -d "${CODEX_HOME:-$HOME/.codex}" ]]; then
  herdr integration install codex
  installed_any=true
fi
if [[ -d "$HOME/.claude" ]]; then
  herdr integration install claude
  installed_any=true
fi
if [[ -d "$HOME/.config/opencode" ]]; then
  herdr integration install opencode
  installed_any=true
fi
if [[ -d "$HOME/.hermes" ]]; then
  herdr integration install hermes
  installed_any=true
fi

if [[ "$installed_any" != "true" ]]; then
  echo "No supported agent config directories found; no Herdr integrations installed."
fi
'''

[tasks.clean-user-tools]
description = "Preview or remove legacy ~/.local/bin tools now managed by mise"
run = '''
#!/usr/bin/env bash
set -euo pipefail

LOCAL_BIN="${HOME}/.local/bin"
CONFIG_FILE="${MISE_CONFIG_FILE:-mise.toml}"
DRY_RUN=true
INTERACTIVE=false
YES=false

usage() {
  cat <<'EOF'
Usage: mise run clean-user-tools -- [--yes|--interactive]

Default mode previews legacy ~/.local/bin binaries that are now managed by mise.
  --yes          Remove all detected legacy binaries without prompting
  --interactive Prompt once before removing all detected legacy binaries
EOF
}

while [[ $# -gt 0 ]]; do
  case "$1" in
    --yes)
      YES=true
      DRY_RUN=false
      shift
      ;;
    --interactive)
      INTERACTIVE=true
      DRY_RUN=false
      shift
      ;;
    -h|--help)
      usage
      exit 0
      ;;
    *)
      echo "Unknown option: $1" >&2
      usage >&2
      exit 1
      ;;
  esac
done

if [[ ! -d "$LOCAL_BIN" ]]; then
  echo "No ~/.local/bin directory found; nothing to clean."
  exit 0
fi

TOOLS_SECTION="$(awk '/^\[tasks\./ { exit } { print }' "$CONFIG_FILE")"
tool_declared() {
  local tool="$1"
  grep -Eq "^[[:space:]]*${tool}[[:space:]]*=" <<<"$TOOLS_SECTION" || \
    grep -Fq "[tools.\"${tool}\"]" <<<"$TOOLS_SECTION"
}

# Allowlist only: tool declaration -> binary names that older scripts placed in ~/.local/bin.
declare -a TOOL_BIN_ALLOWLIST=(
  'fd|fd'
  'ripgrep|rg'
  'lazygit|lazygit'
  'zellij|zellij'
  'zoxide|zoxide'
  'fzf|fzf'
  'just|just'
  'eza|eza'
  'yazi|yazi ya'
  'btop|btop'
  'bat|bat'
  'dust|dust'
  'neovim|nvim'
  'codex|codex'
  'github:ogulcancelik/herdr|herdr'
)

declare -a candidates=()
found=false
for entry in "${TOOL_BIN_ALLOWLIST[@]}"; do
  tool="${entry%%|*}"
  bins="${entry#*|}"
  if ! tool_declared "$tool"; then
    continue
  fi
  for bin in $bins; do
    path="$LOCAL_BIN/$bin"
    [[ -e "$path" || -L "$path" ]] || continue
    if [[ -d "$path" && ! -L "$path" ]]; then
      echo "Skipping directory: $path" >&2
      continue
    fi
    if [[ -L "$path" ]]; then
      target="$(readlink "$path" || true)"
      if [[ "$target" == *"/.local/share/mise/"* || "$target" == *"/.local/state/mise/"* ]]; then
        echo "Skipping mise-owned symlink: $path -> $target" >&2
        continue
      fi
    fi
    candidates+=("$path")
    found=true
  done
done

if [[ "$found" != "true" ]]; then
  echo "No legacy mise-managed binaries found in ~/.local/bin."
  exit 0
fi

printf 'Legacy ~/.local/bin binaries managed by mise:\n'
printf '  %s\n' "${candidates[@]}"

if [[ "$DRY_RUN" == "true" ]]; then
  echo "Dry run only. Re-run with --yes to remove, or --interactive to prompt."
  exit 0
fi

if [[ "$YES" != "true" ]]; then
  if [[ "$INTERACTIVE" != "true" || ! -t 0 ]]; then
    echo "Refusing to remove without --yes or an interactive terminal." >&2
    exit 1
  fi
  read -r -p "Remove all listed legacy binaries? [y/N] " answer
  case "$answer" in
    y|Y|yes|YES) ;;
    *)
      echo "Skipped legacy binary cleanup."
      exit 0
      ;;
  esac
fi

removed_count=0
for _candidate in "${candidates[@]}"; do
  removed_count=$((removed_count + 1))
done
rm -f -- "${candidates[@]}"
printf 'Removed %d legacy binaries.\n' "$removed_count"
'''

[tasks.setup]
description = "Bootstrap this machine from dotfiles"
run = """
#!/usr/bin/env bash
set -euo pipefail

mise install
if ! mise run clean-user-tools -- --interactive; then
  echo "WARN: legacy user-space tool cleanup skipped or unavailable; continuing setup." >&2
fi
mise run sync-global-mise-tools
mise run install-herdr-agent-skill
mise run install-herdr-integrations
mise run ensure-local-fish
mise run propagate-core

if ! mise run install-fish; then
  echo "WARN: fish install failed; continuing because C++ compiler may be missing on this host." >&2
fi
"""
